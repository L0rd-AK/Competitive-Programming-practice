<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bloom for You</title>
  <style>
    :root{
      --bg1:#09050b;
      --bg2:#1b0d18;
      --bg3:#2b1020;
      --rose:#f2a7b5;
      --rose2:#d86c87;
      --rose3:#a43e61;
      --gold:#f2c87c;
      --leaf:#5aa06f;
      --leaf2:#356347;
      --stem:#274f3a;
      --text:#ffeef3;
      --soft:rgba(255,255,255,.12);
      --glow:rgba(216,108,135,.35);
    }

    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{
      overflow:hidden;
      background:
        radial-gradient(circle at 50% 30%, rgba(242,168,190,.18), transparent 24%),
        radial-gradient(circle at 20% 20%, rgba(255,255,255,.07), transparent 18%),
        radial-gradient(circle at 80% 80%, rgba(242,200,124,.08), transparent 22%),
        linear-gradient(160deg, var(--bg3), var(--bg2) 40%, var(--bg1) 100%);
      color:var(--text);
      font-family: Georgia, "Times New Roman", serif;
    }

    .scene{
      position:relative;
      width:100%;
      height:100%;
      display:grid;
      place-items:center;
      isolation:isolate;
    }

    .aurora{
      position:absolute;
      inset:-20%;
      background:
        radial-gradient(circle at 20% 30%, rgba(243,166,192,.13), transparent 22%),
        radial-gradient(circle at 70% 20%, rgba(255,214,143,.10), transparent 18%),
        radial-gradient(circle at 60% 75%, rgba(89,160,111,.12), transparent 20%),
        radial-gradient(circle at 35% 80%, rgba(255,255,255,.06), transparent 18%);
      filter: blur(40px);
      animation: drift 18s ease-in-out infinite alternate;
      z-index:-3;
    }
    @keyframes drift{
      from{transform:translate3d(-1.5%, -1%, 0) scale(1)}
      to{transform:translate3d(1.5%, 1%, 0) scale(1.06)}
    }

    .stars, .sparkles{
      position:absolute;
      inset:0;
      pointer-events:none;
      z-index:-2;
    }

    .star{
      position:absolute;
      width:2px;height:2px;border-radius:50%;
      background:rgba(255,245,248,.85);
      box-shadow:0 0 8px rgba(255,245,248,.55);
      animation: twinkle var(--d) ease-in-out infinite;
      opacity:.5;
    }
    @keyframes twinkle{
      0%,100%{transform:scale(.7);opacity:.25}
      50%{transform:scale(1.6);opacity:1}
    }

    .flower-wrap{
      position:relative;
      width:min(84vw, 520px);
      height:min(86vh, 720px);
      display:grid;
      place-items:end center;
      transform: translateY(2vh);
      filter: drop-shadow(0 25px 60px rgba(0,0,0,.45));
    }

    .halo{
      position:absolute;
      bottom:28%;
      width:min(50vw, 320px);
      aspect-ratio:1;
      border-radius:50%;
      background:radial-gradient(circle, rgba(242,168,190,.20) 0%, rgba(242,168,190,.08) 26%, transparent 68%);
      filter: blur(4px);
      animation: pulse 4s ease-in-out infinite;
      z-index:0;
    }
    @keyframes pulse{
      0%,100%{transform:scale(1);opacity:.9}
      50%{transform:scale(1.12);opacity:.62}
    }

    .stem{
      position:absolute;
      bottom:7%;
      width:10px;
      height:34%;
      border-radius:999px;
      background:linear-gradient(to top, var(--stem), #4f8a61 55%, #6eb17f 100%);
      transform-origin:bottom center;
      animation: growStem 1.4s cubic-bezier(.2,1,.2,1) both;
      z-index:1;
    }
    @keyframes growStem{
      from{transform:scaleY(0)}
      to{transform:scaleY(1)}
    }

    .leaf{
      position:absolute;
      width:clamp(60px, 12vw, 110px);
      height:clamp(28px, 5vw, 52px);
      bottom:18%;
      background:linear-gradient(135deg, var(--leaf), var(--leaf2));
      border-radius:50% 0 50% 0;
      box-shadow:inset 0 8px 18px rgba(255,255,255,.08);
      opacity:0;
      animation: leafIn 1.2s .9s ease-out forwards;
      z-index:1;
    }
    .leaf::after{
      content:"";
      position:absolute;
      inset:12% 14%;
      border-radius:inherit;
      background:linear-gradient(135deg, rgba(255,255,255,.10), transparent 60%);
      transform:rotate(-6deg);
    }
    .leaf.left{
      left:calc(50% - 14px);
      transform-origin:right center;
      transform:rotate(-32deg) scaleX(0);
    }
    .leaf.right{
      left:calc(50% - 2px);
      transform-origin:left center;
      transform:rotate(32deg) scaleX(0) scaleX(-1);
    }
    @keyframes leafIn{
      to{opacity:1; transform:rotate(var(--rot)) scaleX(1)}
    }
    .leaf.left{ --rot:-32deg; }
    .leaf.right{ --rot:32deg; }

    .bloom{
      position:absolute;
      bottom:26%;
      width:min(58vw, 270px);
      aspect-ratio:1;
      display:grid;
      place-items:center;
      transform-origin:center;
      animation: bloomIn 1.8s cubic-bezier(.18,1.25,.22,1) both;
      z-index:3;
    }
    @keyframes bloomIn{
      from{transform:scale(.15) rotate(-22deg); opacity:0}
      to{transform:scale(1) rotate(0deg); opacity:1}
    }

    .petal-ring{
      position:absolute;
      inset:0;
      animation: slowSpin 22s linear infinite;
    }
    @keyframes slowSpin{ to{ transform:rotate(360deg); } }

    .petal{
      position:absolute;
      left:50%;
      top:50%;
      width:clamp(44px, 9vw, 74px);
      height:clamp(92px, 16vw, 140px);
      margin-left:calc(-1 * clamp(22px, 4.5vw, 37px));
      margin-top:calc(-1 * clamp(88px, 15vw, 130px));
      border-radius:50% 50% 40% 40% / 70% 70% 35% 35%;
      transform-origin:bottom center;
      background:
        radial-gradient(ellipse at 38% 22%, rgba(255,255,255,.78) 0%, rgba(255,255,255,.18) 14%, transparent 28%),
        linear-gradient(180deg, #ffe6ec 0%, #f5bcc8 30%, var(--rose) 62%, var(--rose2) 84%, var(--rose3) 100%);
      box-shadow:
        inset 0 10px 20px rgba(255,255,255,.22),
        inset 0 -10px 20px rgba(120,20,48,.12),
        0 8px 18px rgba(0,0,0,.14);
      filter:saturate(1.05);
      animation: breathe 4.8s ease-in-out infinite;
    }
    @keyframes breathe{
      0%,100%{transform:rotate(var(--r)) translateY(-38px) scale(1)}
      50%{transform:rotate(var(--r)) translateY(-38px) scale(1.04)}
    }
    .petal::before{
      content:"";
      position:absolute;
      inset:8% 16% 14%;
      border-radius:inherit;
      background:linear-gradient(180deg, rgba(255,255,255,.25), transparent 55%);
      transform:skewY(-4deg);
      opacity:.95;
    }

    .petal.inner{
      width:clamp(34px, 6.5vw, 56px);
      height:clamp(74px, 12vw, 110px);
      margin-left:calc(-1 * clamp(17px, 3.25vw, 28px));
      margin-top:calc(-1 * clamp(70px, 11vw, 100px));
      opacity:.96;
      filter:brightness(.98);
    }

    .center{
      position:relative;
      width:clamp(38px, 7vw, 64px);
      height:clamp(38px, 7vw, 64px);
      border-radius:50%;
      z-index:10;
      background:
        radial-gradient(circle at 35% 30%, #fff7ad 0%, var(--gold) 40%, #b16a25 78%, #7d3f14 100%);
      box-shadow:
        0 0 0 5px rgba(242,200,124,.18),
        0 0 30px rgba(242,200,124,.45);
      animation: centerPulse 2.8s ease-in-out infinite;
    }
    @keyframes centerPulse{
      0%,100%{transform:scale(1)}
      50%{transform:scale(1.12)}
    }
    .center::before,
    .center::after{
      content:"";
      position:absolute;
      inset:14%;
      border-radius:50%;
      background:
        radial-gradient(circle at 25% 25%, rgba(255,255,255,.9) 0 8%, transparent 9%),
        radial-gradient(circle at 65% 55%, rgba(255,255,255,.7) 0 5%, transparent 6%),
        radial-gradient(circle at 42% 72%, rgba(255,255,255,.5) 0 4%, transparent 5%);
      opacity:.55;
    }
    .center::after{
      inset:22%;
      opacity:.28;
      filter:blur(1px);
    }

    .petal.r1{ --r:0deg; }
    .petal.r2{ --r:30deg; }
    .petal.r3{ --r:60deg; }
    .petal.r4{ --r:90deg; }
    .petal.r5{ --r:120deg; }
    .petal.r6{ --r:150deg; }
    .petal.r7{ --r:180deg; }
    .petal.r8{ --r:210deg; }
    .petal.r9{ --r:240deg; }
    .petal.r10{ --r:270deg; }
    .petal.r11{ --r:300deg; }
    .petal.r12{ --r:330deg; }

    .petal.i1{ --r:15deg; }
    .petal.i2{ --r:45deg; }
    .petal.i3{ --r:75deg; }
    .petal.i4{ --r:105deg; }
    .petal.i5{ --r:135deg; }
    .petal.i6{ --r:165deg; }
    .petal.i7{ --r:195deg; }
    .petal.i8{ --r:225deg; }
    .petal.i9{ --r:255deg; }
    .petal.i10{ --r:285deg; }
    .petal.i11{ --r:315deg; }
    .petal.i12{ --r:345deg; }

    .butterfly{
      position:absolute;
      top:14%;
      left:12%;
      width:52px;
      height:32px;
      opacity:.85;
      transform-origin:center;
      animation: flutter 7s ease-in-out infinite;
      filter:drop-shadow(0 0 8px rgba(255,255,255,.16));
    }
    .butterfly::before,
    .butterfly::after{
      content:"";
      position:absolute;
      width:24px;
      height:26px;
      top:0;
      background:linear-gradient(180deg, rgba(255,255,255,.55), rgba(242,168,190,.18));
      border-radius:70% 30% 60% 40% / 60% 40% 60% 40%;
      border:1px solid rgba(255,255,255,.16);
      animation: wing 0.28s ease-in-out infinite alternate;
    }
    .butterfly::before{ left:4px; transform:rotate(-18deg); transform-origin:right bottom; }
    .butterfly::after{ right:4px; transform:rotate(18deg) scaleX(-1); transform-origin:left bottom; }
    .butterfly span{
      position:absolute;
      left:50%;
      top:9px;
      width:2px;height:16px;
      background:rgba(255,255,255,.55);
      border-radius:999px;
      transform:translateX(-50%);
    }
    @keyframes wing{
      from{transform:rotate(-24deg) translateY(0)}
      to{transform:rotate(24deg) translateY(-1px)}
    }
    @keyframes flutter{
      0%,100%{transform:translate(0,0) rotate(-6deg)}
      25%{transform:translate(18vw, 4vh) rotate(8deg)}
      50%{transform:translate(42vw, -1vh) rotate(-10deg)}
      75%{transform:translate(24vw, 7vh) rotate(6deg)}
    }

    .note{
      position:absolute;
      bottom:4.5%;
      left:50%;
      transform:translateX(-50%);
      width:min(86vw, 560px);
      padding:18px 22px;
      text-align:center;
      border:1px solid rgba(255,255,255,.12);
      border-radius:24px;
      background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03));
      backdrop-filter: blur(8px);
      box-shadow:0 18px 50px rgba(0,0,0,.28);
      animation: noteIn 1.2s 1.35s both;
    }
    @keyframes noteIn{
      from{opacity:0; transform:translateX(-50%) translateY(18px)}
      to{opacity:1; transform:translateX(-50%) translateY(0)}
    }
    .note h1{
      font-size:clamp(1.8rem, 4vw, 3.4rem);
      font-weight:400;
      letter-spacing:.02em;
      line-height:1.05;
      text-shadow:0 8px 30px rgba(0,0,0,.3);
    }
    .note p{
      margin-top:10px;
      font-family: Arial, Helvetica, sans-serif;
      font-size:clamp(.72rem, 1.9vw, .88rem);
      letter-spacing:.34em;
      text-transform:uppercase;
      color:rgba(255,238,243,.82);
    }
    .divider{
      width:92px;
      height:1px;
      margin:12px auto 0;
      background:linear-gradient(90deg, transparent, rgba(242,200,124,.95), transparent);
      opacity:.75;
    }

    .heart{
      display:inline-block;
      color:#ff8fb2;
      animation: heartBeat 1.3s ease-in-out infinite;
      filter:drop-shadow(0 0 10px rgba(255,143,178,.35));
    }
    @keyframes heartBeat{
      0%,100%{transform:scale(1)}
      20%{transform:scale(1.15)}
      40%{transform:scale(.98)}
      60%{transform:scale(1.2)}
      80%{transform:scale(1.02)}
    }

    .hint{
      margin-top:8px;
      font-size:.74rem;
      opacity:.78;
      letter-spacing:.16em;
    }

    @media (max-width: 520px){
      .butterfly{display:none}
      .note{padding:16px 16px 14px}
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="aurora"></div>
    <div class="stars" id="stars"></div>
    <div class="sparkles" id="sparkles"></div>

    <div class="flower-wrap">
      <div class="halo"></div>

      <div class="butterfly"><span></span></div>

      <div class="bloom" aria-label="romantic flower">
        <div class="petal-ring">
          <div class="petal r1"></div>
          <div class="petal r2"></div>
          <div class="petal r3"></div>
          <div class="petal r4"></div>
          <div class="petal r5"></div>
          <div class="petal r6"></div>
          <div class="petal r7"></div>
          <div class="petal r8"></div>
          <div class="petal r9"></div>
          <div class="petal r10"></div>
          <div class="petal r11"></div>
          <div class="petal r12"></div>

          <div class="petal inner i1"></div>
          <div class="petal inner i2"></div>
          <div class="petal inner i3"></div>
          <div class="petal inner i4"></div>
          <div class="petal inner i5"></div>
          <div class="petal inner i6"></div>
          <div class="petal inner i7"></div>
          <div class="petal inner i8"></div>
          <div class="petal inner i9"></div>
          <div class="petal inner i10"></div>
          <div class="petal inner i11"></div>
          <div class="petal inner i12"></div>
        </div>
        <div class="center"></div>
      </div>

      <div class="stem"></div>
      <div class="leaf left"></div>
      <div class="leaf right"></div>
    </div>

    <div class="note">
      <h1>For you,<br>always <span class="heart">♥</span></h1>
      <div class="divider"></div>
      <p>made with quiet love and a little magic</p>
      <div class="hint">move your mouse for a soft glow</div>
    </div>
  </div>

  <script>
    const stars = document.getElementById('stars');
    const sparkles = document.getElementById('sparkles');

    function makeStarField(count = 80) {
      for (let i = 0; i < count; i++) {
        const s = document.createElement('div');
        s.className = 'star';
        s.style.left = `${Math.random() * 100}%`;
        s.style.top = `${Math.random() * 100}%`;
        s.style.setProperty('--d', `${1.8 + Math.random() * 4.8}s`);
        s.style.animationDelay = `${Math.random() * 4}s`;
        s.style.transform = `scale(${0.6 + Math.random() * 1.4})`;
        s.style.opacity = `${0.18 + Math.random() * 0.75}`;
        stars.appendChild(s);
      }
    }

    function burstSparkles() {
      const cx = window.innerWidth / 2;
      const cy = window.innerHeight * 0.42;
      const n = 18;

      for (let i = 0; i < n; i++) {
        const p = document.createElement('div');
        p.className = 'star';
        const angle = (Math.PI * 2 * i) / n + (Math.random() * 0.35);
        const dist = 50 + Math.random() * 120;
        const x = cx + Math.cos(angle) * dist;
        const y = cy + Math.sin(angle) * dist;

        p.style.left = `${x}px`;
        p.style.top = `${y}px`;
        p.style.width = `${2 + Math.random() * 3}px`;
        p.style.height = p.style.width;
        p.style.borderRadius = '50%';
        p.style.background = Math.random() > 0.5 ? 'rgba(255,235,245,.95)' : 'rgba(242,200,124,.95)';
        p.style.boxShadow = '0 0 12px rgba(255,255,255,.45)';
        p.style.setProperty('--d', `${1.2 + Math.random() * 1.8}s`);
        p.style.animation = 'twinkle 1.4s ease-in-out infinite';
        p.style.opacity = '1';

        sparkles.appendChild(p);
        setTimeout(() => p.remove(), 3800);
      }
    }

    const root = document.documentElement;
    window.addEventListener('mousemove', (e) => {
      const x = (e.clientX / window.innerWidth - 0.5) * 16;
      const y = (e.clientY / window.innerHeight - 0.5) * 16;
      root.style.setProperty('--mx', `${x}px`);
      root.style.setProperty('--my', `${y}px`);
      document.querySelector('.flower-wrap').style.transform = `translate(${x * .08}px, ${y * .08}px) translateY(2vh)`;
    });

    makeStarField(96);
    burstSparkles();
    setInterval(burstSparkles, 5200);
  </script>
</body>
</html>
